<div
  class="course-container"
  [class.border]="courses().length > 6"
  [class.is-expanded]="showAll()"
>
  <div class="course-list-wrapper">
    @for (course of visibleCourses(); track course.title) {
      <div class="course-item">
        @if (course.certificateURL) {
          <a href="{{ course.certificateURL }}" target="_blank"
            ><h5>
              {{ course.title
              }}<icon name="ph:arrow-up-right" size="18"></icon></h5
          ></a>
        } @else {
          <h5>{{ course.title }}</h5>
        }
        <div class="course-details">
          <h6>{{ course.provider }}</h6>
          <div class="seperator"></div>
          <h6>{{ course.dateCompleted }}</h6>
        </div>
      </div>
    }
    @if (courses().length > 6) {
      <button class="show-courses-button" (click)="toggleShowAll()">
        {{ showAll() ? "Show Less" : "Show All" }}
      </button>
    }
  </div>
</div>
