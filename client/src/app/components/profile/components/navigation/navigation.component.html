<ul>
  @for (item of sections | keyvalue: unsorted; track item.key) {
    <li [class.active]="isSectionActive(item.value)">
      <a [routerLink]="['/']" [fragment]="item.value">
        <span class="nav-indicator"></span>
        <span class="nav-item">{{ item.value }}</span>
      </a>
    </li>
  }
</ul>
