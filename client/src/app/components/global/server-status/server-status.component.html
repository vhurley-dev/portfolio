<div class="status-container" [class.is-ready]="isReady()">
  <div class="status-indicator">
    <span class="pulse-dot"></span>
  </div>

  <span class="status-text">
    @if (isReady()) {
      Backend server is online
    } @else {
      Waking up server... (Deployed on Render Free Tier so it can take a few
      seconds)
    }
  </span>
</div>
