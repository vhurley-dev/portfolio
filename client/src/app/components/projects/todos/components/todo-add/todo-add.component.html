<div class="add-task clearfix">
  <input
    [disabled]="isDisabled()"
    [ngModel]="taskTitle()"
    (ngModelChange)="taskTitle.set($event)"
    (keydown.enter)="newTask()"
    [placeholder]="isDisabled() ? '' : 'What do you need to do?'"
    autofocus
  />
  <button
    [disabled]="isDisabled() || !taskTitle().trim()"
    [class.disabled]="isDisabled() || !taskTitle().trim()"
    (click)="newTask()"
  >
    Add
  </button>
</div>
